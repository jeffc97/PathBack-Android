name: Build PathBack Thread Fix v8.2

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Extract complete PathBack project
        run: unzip -o PathBack-Thread-Fix-v8.2.zip

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Restore private signing key
        env:
          PATHBACK_KEYSTORE_BASE64: ${{ secrets.PATHBACK_KEYSTORE_BASE64 }}
        run: |
          test -n "$PATHBACK_KEYSTORE_BASE64"
          printf '%s' "$PATHBACK_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/pathback-release.jks"

      - name: Run tests and build signed APK
        env:
          PATHBACK_KEYSTORE_PATH: ${{ runner.temp }}/pathback-release.jks
          PATHBACK_KEYSTORE_PASSWORD: ${{ secrets.PATHBACK_KEYSTORE_PASSWORD }}
          PATHBACK_KEY_ALIAS: ${{ secrets.PATHBACK_KEY_ALIAS }}
          PATHBACK_KEY_PASSWORD: ${{ secrets.PATHBACK_KEYSTORE_PASSWORD }}
        run: gradle --no-daemon testDebugUnitTest assembleRelease --stacktrace

      - name: Verify APK exists
        run: test -f app/build/outputs/apk/release/app-release.apk

      - name: Upload installable APK
        uses: actions/upload-artifact@v4
        with:
          name: PathBack-Thread-Fix-v8.2-APK
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 30
