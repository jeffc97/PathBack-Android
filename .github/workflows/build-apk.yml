name: Build PathBack APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Extract PathBack project
        run: unzip -o PathBack-Android-Offline-Relocalization.zip

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Build and test APK
        run: gradle test assembleDebug --stacktrace

      - name: Package APK
        uses: actions/upload-artifact@v4
        with:
          name: PathBack-APK
          path: app/build/outputs/apk/debug/app-debug.apk
